<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Method Words Visualizer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }
      body {
        margin: 0;
        background: #f6f7fb;
        color: #1f2937;
      }
      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 20px;
      }
      h1 {
        margin: 0 0 12px;
      }
      .controls {
        background: #ffffff;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 16px;
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .controls input {
        width: 70px;
        padding: 4px 8px;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        font-size: 14px;
      }
      .controls input:invalid {
        border-color: #ef4444;
      }
      .controls button {
        padding: 5px 14px;
        background: #3b82f6;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
      .controls button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* ── Status badge ── */
      #statusBadge {
        margin-left: auto;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        background: #fef3c7;
        color: #92400e;
        transition: background 0.3s, color 0.3s;
      }
      #statusBadge.connected    { background: #d1fae5; color: #065f46; }
      #statusBadge.disconnected { background: #fee2e2; color: #991b1b; }

      .cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      .card {
        background: #ffffff;
        border-radius: 8px;
        padding: 12px;
        position: relative;
      }
      .card h3 {
        margin: 0 0 8px;
      }
      .chart-area {
        height: 280px;
        position: relative;
      }

      /* Empty-state overlay */
      .empty-state {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #9ca3af;
        font-size: 13px;
        pointer-events: none;
      }

      canvas { width: 100%; height: 100%; }
      .legend-list {
        margin-top: 10px;
        max-height: 140px;
        overflow-y: auto;
        border-top: 1px solid #e5e7eb;
        padding-top: 8px;
        font-size: 12px;
        line-height: 1.35;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }
      .legend-color {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        flex: 0 0 auto;
      }
      @media (max-width: 900px) {
        .cards { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Ranking de palabras en métodos/funciones</h1>

      <div class="controls">
        <label for="topN">Top N:</label>
        <input
          id="topN"
          type="number"
          min="1"
          max="200"
          value="20"
          title="Ingresa un número entre 1 y 200"
        />
        <button id="applyTopN">Aplicar</button>
        <span id="statusBadge">Conectando…</span>
      </div>

      <div class="cards">
        <div class="card">
          <h3>Total</h3>
          <div class="chart-area">
            <canvas id="totalChart"></canvas>
            <div class="empty-state" id="totalEmpty">Sin datos aún…</div>
          </div>
          <div id="totalLegend" class="legend-list"></div>
        </div>
        <div class="card">
          <h3>Python</h3>
          <div class="chart-area">
            <canvas id="pythonChart"></canvas>
            <div class="empty-state" id="pythonEmpty">Sin datos aún…</div>
          </div>
          <div id="pythonLegend" class="legend-list"></div>
        </div>
        <div class="card">
          <h3>Java</h3>
          <div class="chart-area">
            <canvas id="javaChart"></canvas>
            <div class="empty-state" id="javaEmpty">Sin datos aún…</div>
          </div>
          <div id="javaLegend" class="legend-list"></div>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
